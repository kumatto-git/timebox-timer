<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timebox Timer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --work-color: #e74c3c;
    --break-color: #2ecc71;
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #eaeaea;
    --muted: #7f8c8d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 24px;
  }

  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Ring Timer ── */
  .ring-container {
    position: relative;
    width: 260px;
    height: 260px;
  }

  .ring-container svg {
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: #2a2a4a;
    stroke-width: 12;
  }

  .ring-progress {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  #time-display {
    font-size: 3.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
    line-height: 1;
  }

  #mode-label {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 16px;
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    padding: 12px 28px;
    transition: transform 0.1s, opacity 0.2s;
  }

  button:active { transform: scale(0.96); }

  #btn-start {
    background: var(--work-color);
    color: #fff;
    min-width: 120px;
  }

  #btn-skip {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid #2a2a4a;
  }

  #btn-reset {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid #2a2a4a;
  }

  /* ── Sessions ── */
  .sessions-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #2a2a4a;
    transition: background 0.4s;
  }

  .dot.done { background: var(--work-color); }

  #session-count {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: 8px;
  }

  /* ── Settings ── */
  details {
    background: var(--surface);
    border: 1px solid #2a2a4a;
    border-radius: 16px;
    padding: 0;
    width: 300px;
    overflow: hidden;
    transition: opacity 0.3s;
  }

  details.locked {
    opacity: 0.4;
    pointer-events: none;
  }

  summary {
    padding: 14px 20px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }

  summary::after { content: '▾'; transition: transform 0.3s; }
  details[open] summary::after { transform: rotate(180deg); }

  .settings-body {
    padding: 0 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }

  .setting-row label { color: var(--text); }

  .setting-row input[type=range] {
    width: 120px;
    accent-color: var(--work-color);
  }

  .setting-row span {
    width: 36px;
    text-align: right;
    color: var(--muted);
    font-size: 0.85rem;
  }

  /* ── Today's stats ── */
  #stats {
    font-size: 0.85rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid #2a2a4a;
    border-radius: 50px;
    padding: 8px 20px;
    letter-spacing: 0.05em;
  }

  /* ── Theme toggle ── */
  #btn-theme {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--surface);
    border: 1px solid #2a2a4a;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 1.1rem;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }

  /* ── Light mode ── */
  body.light {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --text: #1a1a2e;
    --muted: #666;
  }

  body.light #btn-theme { border-color: #ddd; }
  body.light .ring-bg { stroke: #ddd; }
  body.light #btn-skip, body.light #btn-reset { border-color: #ddd; }
  body.light #stats { border-color: #ddd; }
  body.light details { border-color: #ddd; }
  body.light .dot { background: #ddd; }

  /* ── Focus mode (running) ── */
  body.focusing h1 { opacity: 0.3; }
  body.focusing #stats { opacity: 0.3; }

  /* ── Notification toast ── */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #0f3460;
    color: #fff;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 0.9rem;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    body { gap: 20px; padding: 16px; }

    .ring-container { width: 200px; height: 200px; }
    .ring-container svg { width: 200px; height: 200px; }
    #time-display { font-size: 3rem; }

    button { padding: 14px 20px; font-size: 0.95rem; }
    #btn-start { min-width: 100px; }

    details { width: 100%; max-width: 340px; }
  }
</style>
</head>
<body>

<button type="button" id="btn-theme" aria-label="テーマ切替">🌙</button>
<h1>⏱ Timebox Timer</h1>

<div class="ring-container">
  <svg viewBox="0 0 260 260" width="260" height="260">
    <circle class="ring-bg" cx="130" cy="130" r="110"/>
    <circle class="ring-progress" id="ring" cx="130" cy="130" r="110"
      stroke-dasharray="691.15"
      stroke-dashoffset="0"
    />
  </svg>
  <div class="ring-label">
    <div id="time-display">25:00</div>
    <div id="mode-label">作業</div>
  </div>
</div>

<div class="controls">
  <button type="button" id="btn-reset" aria-label="リセット">↺</button>
  <button type="button" id="btn-start">スタート</button>
  <button type="button" id="btn-skip">スキップ</button>
</div>

<div class="sessions-row" id="dots-row">
  <div class="dot" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <span id="session-count">0 / 4 セッション</span>
</div>

<div id="stats">🍅 今日: 0セッション（0分）</div>

<details id="settings-panel">
  <summary>設定</summary>
  <div class="settings-body">
    <div class="setting-row">
      <label>作業時間</label>
      <input type="range" id="work-range" min="1" max="60" value="25">
      <span id="work-val">25分</span>
    </div>
    <div class="setting-row">
      <label>短い休憩</label>
      <input type="range" id="short-range" min="1" max="30" value="5">
      <span id="short-val">5分</span>
    </div>
    <div class="setting-row">
      <label>長い休憩</label>
      <input type="range" id="long-range" min="5" max="60" value="15">
      <span id="long-val">15分</span>
    </div>
    <div class="setting-row">
      <label>セッション数</label>
      <input type="range" id="sessions-range" min="2" max="8" value="4">
      <span id="sessions-val">4回</span>
    </div>
  </div>
</details>

<div id="toast"></div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 110;

const ring = document.getElementById('ring');
const timeDisplay = document.getElementById('time-display');
const modeLabel = document.getElementById('mode-label');
const btnStart = document.getElementById('btn-start');
const btnSkip = document.getElementById('btn-skip');
const btnReset = document.getElementById('btn-reset');
const sessionCount = document.getElementById('session-count');
const toast = document.getElementById('toast');
const statsEl = document.getElementById('stats');
const settingsPanel = document.getElementById('settings-panel');

const workRange = document.getElementById('work-range');
const shortRange = document.getElementById('short-range');
const longRange = document.getElementById('long-range');
const sessionsRange = document.getElementById('sessions-range');

// ── localStorage helpers ──────────────────────────────
function loadCfg() {
  try {
    const saved = JSON.parse(localStorage.getItem('timebox-cfg'));
    return saved || { work: 25, short: 5, long: 15, sessions: 4 };
  } catch { return { work: 25, short: 5, long: 15, sessions: 4 }; }
}

function saveCfg() {
  localStorage.setItem('timebox-cfg', JSON.stringify(cfg));
}

function loadStats() {
  try {
    const saved = JSON.parse(localStorage.getItem('timebox-stats'));
    const today = new Date().toDateString();
    if (saved && saved.date === today) return saved;
  } catch {}
  return { date: new Date().toDateString(), sessions: 0, minutes: 0 };
}

function saveStats() {
  localStorage.setItem('timebox-stats', JSON.stringify(todayStats));
}

function loadTheme() {
  return localStorage.getItem('timebox-theme') || 'dark';
}

// ── State ────────────────────────────────────────────
let cfg = loadCfg();
let todayStats = loadStats();
let state = { mode: 'work', session: 0, running: false, remaining: cfg.work * 60, total: cfg.work * 60 };
let ticker = null;

// Apply saved settings to sliders
workRange.value = cfg.work;
shortRange.value = cfg.short;
longRange.value = cfg.long;
sessionsRange.value = cfg.sessions;
document.getElementById('work-val').textContent = cfg.work + '分';
document.getElementById('short-val').textContent = cfg.short + '分';
document.getElementById('long-val').textContent = cfg.long + '分';
document.getElementById('sessions-val').textContent = cfg.sessions + '回';

// Apply saved theme
if (loadTheme() === 'light') {
  document.body.classList.add('light');
  document.getElementById('btn-theme').textContent = '🌙';
} else {
  document.getElementById('btn-theme').textContent = '☀️';
}

// ── Audio ────────────────────────────────────────────
function beep(freq, dur, vol, type = 'sine') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function chimeBreak() {
  // 明るい3音（達成感）
  beep(523, 0.15, 0.25);
  setTimeout(() => beep(659, 0.15, 0.25), 180);
  setTimeout(() => beep(784, 0.3, 0.3), 360);
}

function chimeWork() {
  // 落ち着いた低めの2音（集中への切り替え）
  beep(440, 0.2, 0.2);
  setTimeout(() => beep(330, 0.3, 0.2), 220);
}

function chimeStart() {
  beep(660, 0.1, 0.15, 'triangle');
}

function chimeCountdown() {
  beep(880, 0.08, 0.1, 'square');
}

// ── Helpers ──────────────────────────────────────────
function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function getAccentColor() {
  return state.mode === 'work' ? '#e74c3c' : '#2ecc71';
}

function updateRing() {
  const pct = state.remaining / state.total;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  ring.style.stroke = getAccentColor();
}

function updateStats() {
  statsEl.textContent = `🍅 今日: ${todayStats.sessions}セッション（${todayStats.minutes}分）`;
}

function render() {
  timeDisplay.textContent = fmt(state.remaining);
  modeLabel.textContent = state.mode === 'work' ? '作業' : state.mode === 'short' ? '休憩' : '長い休憩';
  document.title = `${fmt(state.remaining)} — ${modeLabel.textContent}`;
  btnStart.textContent = state.running ? '一時停止' : 'スタート';
  btnStart.style.background = state.running ? '#555' : getAccentColor();
  updateRing();
  updateDots();
  sessionCount.textContent = `${state.session} / ${cfg.sessions} セッション`;
  updateStats();

  // 集中モード
  document.body.classList.toggle('focusing', state.running);
  settingsPanel.classList.toggle('locked', state.running);
}

function updateDots() {
  const dotsRow = document.getElementById('dots-row');
  const existing = dotsRow.querySelectorAll('.dot');
  if (existing.length !== cfg.sessions) {
    existing.forEach(d => d.remove());
    for (let i = 0; i < cfg.sessions; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      dotsRow.insertBefore(d, sessionCount);
    }
  }
  dotsRow.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('done', i < state.session);
  });
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── Notifications ─────────────────────────────────────
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function notify(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body });
  }
}

// ── State transitions ─────────────────────────────────
function advanceMode() {
  if (state.mode === 'work') {
    state.session++;
    todayStats.sessions++;
    todayStats.minutes += cfg.work;
    saveStats();

    const isLong = state.session % cfg.sessions === 0;
    if (isLong) {
      state.mode = 'long';
      state.total = cfg.long * 60;
      showToast('🎉 お疲れ様！長い休憩タイムです');
      notify('お疲れ様！', '長い休憩タイムです 🎉');
      chimeBreak();
    } else {
      state.mode = 'short';
      state.total = cfg.short * 60;
      showToast('☕ 短い休憩をどうぞ');
      notify('休憩タイム', '短い休憩をどうぞ ☕');
      chimeBreak();
    }
  } else {
    state.mode = 'work';
    state.total = cfg.work * 60;
    showToast('💪 作業開始！');
    notify('作業開始！', '集中しましょう 💪');
    chimeWork();
  }
  state.remaining = state.total;
}

function tick() {
  if (state.remaining > 0) {
    state.remaining--;
    // 終了間際10秒のカウントダウン音
    if (state.remaining <= 10 && state.remaining > 0) {
      chimeCountdown();
    }
    render();
  } else {
    advanceMode();
    render();
  }
}

function startStop() {
  if (state.running) {
    clearInterval(ticker);
    state.running = false;
  } else {
    state.running = true;
    ticker = setInterval(tick, 1000);
    chimeStart();
  }
  render();
}

function skip() {
  clearInterval(ticker);
  state.running = false;
  advanceMode();
  render();
}

function reset() {
  clearInterval(ticker);
  state.running = false;
  state.mode = 'work';
  state.session = 0;
  state.total = cfg.work * 60;
  state.remaining = state.total;
  render();
}

// ── Settings wiring ──────────────────────────────────
function bindRange(el, valEl, key, unit, onchange) {
  el.addEventListener('input', () => {
    cfg[key] = +el.value;
    valEl.textContent = el.value + unit;
    saveCfg();
    onchange && onchange();
  });
}

bindRange(workRange, document.getElementById('work-val'), 'work', '分', () => {
  if (state.mode === 'work' && !state.running) {
    state.total = cfg.work * 60;
    state.remaining = state.total;
    render();
  }
});
bindRange(shortRange, document.getElementById('short-val'), 'short', '分');
bindRange(longRange, document.getElementById('long-val'), 'long', '分');
bindRange(sessionsRange, document.getElementById('sessions-val'), 'sessions', '回', () => {
  if (state.session > cfg.sessions) state.session = cfg.sessions;
  render();
});

btnStart.addEventListener('click', startStop);
btnSkip.addEventListener('click', skip);
btnReset.addEventListener('click', reset);

// ── Theme toggle ─────────────────────────────────────
const btnTheme = document.getElementById('btn-theme');
btnTheme.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light');
  btnTheme.textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('timebox-theme', isLight ? 'light' : 'dark');
});

// ── Keyboard shortcut ─────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    startStop();
  }
});

// ── Service Worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/timebox-timer/service-worker.js');
}

// Init
requestNotificationPermission();
ring.style.strokeDasharray = CIRCUMFERENCE;
render();
</script>
</body>
</html>
